name: Scheiber
slug: scheiber
version: "6.9.1"
description: >
  Scheiber CAN-to-MQTT bridge for Home Assistant with MQTT discovery,
  ingress setup, and optional live Bloc9 configuration tooling.
url: "https://github.com/eburi/ha_addon_scheiber"

arch:
  - amd64
  - armv7
  - aarch64

startup: services
init: false
host_network: true
ingress: true
ingress_port: 8099
panel_title: Scheiber Setup
panel_icon: mdi:lightbulb-group

privileged:
  - NET_ADMIN
  - SYS_RAWIO

map:
  - addon_config:rw

options:
  can_interface: can1
  mqtt_host: localhost
  mqtt_port: 1883
  mqtt_user: mqtt_user
  mqtt_password: mqtt
  mqtt_topic_prefix: homeassistant
  log_level: info
  data_dir: /data
  config_file: /config/scheiber-config.yaml
  web_ui_enabled: true
  mcp_server_enabled: false

schema:
  can_interface: str
  mqtt_host: str
  mqtt_port: port
  mqtt_user: str
  mqtt_password: password
  mqtt_topic_prefix: str
  log_level: list(info|debug|warning|error)
  data_dir: str?
  config_file: str?
  web_ui_enabled: bool
  mcp_server_enabled: bool
